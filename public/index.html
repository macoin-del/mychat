<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
}

header {
    background: #111a2e;
    padding: 15px;
    text-align: center;
    color: #4da3ff;
}

#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    background: #111a2e;
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
}

.user {
    color: #4da3ff;
    font-weight: bold;
}

footer {
    display: flex;
    padding: 10px;
    background: #111a2e;
}

input {
    flex: 1;
    padding: 10px;
    background: #0b0f1a;
    border: none;
    color: white;
}

button {
    margin-left: 5px;
    padding: 10px;
    background: #4da3ff;
    border: none;
    color: white;
}
</style>
</head>

<body>

<header>💬 Telegram PRO</header>

<div>
<input id="room" placeholder="room (main, games, etc)">
<button onclick="join()">join</button>
</div>

<div id="chat"></div>

<footer>
<input id="msg" placeholder="message">
<button onclick="send()">send</button>
</footer>

<div>
<button onclick="ban()">BAN user (admin)</button>
<button onclick="clearChat()">CLEAR (admin)</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let name = prompt("your name:");
let room = "main";

socket.emit("join", { name, room });

function join(){
    room = document.getElementById("room").value;
    socket.emit("join", { name, room });
}

function send(){
    const msg = document.getElementById("msg").value;
    socket.emit("chat message", msg);
}

socket.on("chat message", (data) => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = "<b class='user'>" + data.user + "</b>: " + data.text;
    document.getElementById("chat").appendChild(div);
});

function ban(){
    let target = prompt("who ban?");
    socket.emit("admin ban", target);
}

function clearChat(){
    socket.emit("admin clear");
}
</script>

</body>
</html>
