<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #070b14;
    color: white;
}

header {
    padding: 15px;
    background: #111a2e;
    color: #4da3ff;
    text-align: center;
}

#chat {
    height: 75vh;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    background: #111a2e;
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
}

img {
    max-width: 200px;
    border-radius: 10px;
    margin-top: 5px;
}

footer {
    display: flex;
    padding: 10px;
    background: #111a2e;
    gap: 5px;
}

input {
    flex: 1;
    padding: 10px;
    background: #0b0f1a;
    border: none;
    color: white;
}

button {
    padding: 10px;
    background: #4da3ff;
    border: none;
    color: white;
}
</style>
</head>

<body>

<header>💬 CHAT PRO</header>

<div id="chat"></div>

<footer>
<input id="msg" placeholder="message...">
<button onclick="send()">Send</button>

<input type="file" id="file" accept="image/*">
</footer>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let name = prompt("Enter name:");
socket.emit("join", name);

function send(){
    const msg = document.getElementById("msg").value;
    if (!msg) return;

    socket.emit("chat message", msg);
    document.getElementById("msg").value = "";
}

// 📸 отправка фото
document.getElementById("file").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
        socket.emit("chat message", {
            type: "image",
            user: name,
            image: e.target.result
        });
    };

    reader.readAsDataURL(file);
});

// 💬 получение сообщений
socket.on("chat message", (data) => {
    const div = document.createElement("div");
    div.className = "msg";

    if (data.type === "image") {
        div.innerHTML = `<b>${data.user}</b><br><img src="${data.image}">`;
    } else {
        div.innerHTML = `<b>${data.user}</b>: ${data}`;
    }

    document.getElementById("chat").appendChild(div);
});
</script>

</body>
</html>
