<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f0f0f;color:white;}
#chat{height:calc(100vh - 120px);overflow-y:auto;padding:10px;}
.msg{background:#1f1f1f;margin:5px;padding:8px;border-radius:10px;}
#inputBar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:5px;padding:10px;background:#111;}
input{flex:1;padding:10px;border-radius:20px;border:none;}
button{border:none;border-radius:50%;width:45px;height:45px;background:#4caf50;color:white;}
.small{font-size:12px;color:gray;}
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputBar">
<input id="text" placeholder="Message..." />
<button id="send">➤</button>
<button id="voice">🎤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let admin = false;
let name = prompt('Your name:');
socket.emit('join', name);

const chat = document.getElementById('chat');
const input = document.getElementById('text');
const send = document.getElementById('send');
const voiceBtn = document.getElementById('voice');

socket.on('admin', a => admin = a);

socket.on('init', (msgs) => {
  msgs.forEach(render);
});

socket.on('message', render);

socket.on('deleteMessage', (id) => {
  const el = document.getElementById(id);
  if (el) el.remove();
});

socket.on('editMessage', ({id, text}) => {
  const el = document.getElementById(id);
  if (el) el.querySelector('.text').innerText = text;
});

function render(m){
  const div = document.createElement('div');
  div.className = 'msg';
  div.id = m.id;

  let content = `<b>${m.name}</b><div class='small'>${m.time}</div>`;

  if(m.text) content += `<div class='text'>${m.text}</div>`;
  if(m.voice) content += `<audio controls src='${m.voice}'></audio>`;

  if(admin){
    content += `<button onclick="del(${m.id})">delete</button>`;
    content += `<button onclick="edit(${m.id})">edit</button>`;
  }

  div.innerHTML = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

send.onclick = () => {
  if(input.value.trim()){
    socket.emit('message',{text:input.value});
    input.value='';
  }
};

function del(id){ socket.emit('deleteMessage',id); }
function edit(id){
  const text = prompt('new text');
  socket.emit('editMessage',{id,text});
}

// Voice recording
let mediaRecorder;
let chunks = [];

navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => chunks.push(e.data);

  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks,{type:'audio/webm'});
    chunks = [];
    const reader = new FileReader();
    reader.onload = () => {
      socket.emit('message',{voice:reader.result});
    };
    reader.readAsDataURL(blob);
  };
});

voiceBtn.addEventListener('mousedown',()=>mediaRecorder.start());
voiceBtn.addEventListener('mouseup',()=>mediaRecorder.stop());
voiceBtn.addEventListener('touchstart',()=>mediaRecorder.start());
voiceBtn.addEventListener('touchend',()=>mediaRecorder.stop());

</script>
</body>
</html>
*/
